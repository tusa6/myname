<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>竹内の自己紹介</title>
    <style>
        body {
            margin: 0;
            font-family: "Hiragino Kaku Gothic ProN", sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 0;
            font-size: 32px;
            color: #333;
        }

        h2 {
            margin-top: 10px;
            font-weight: normal;
            color: #666;
        }

        p {
            margin-top: 20px;
            color: #555;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            border-radius: 30px;
            background: #66a6ff;
            color: white;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .button:hover {
            background: #4f8ef7;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>竹内</h1>
        <h2>Welcome to my page</h2>
        <p>
            はじめまして、竹内です。<br>
            このページは私の自己紹介ページです。<br>
            どうぞよろしくお願いします！
        </p>
        <a href="#" class="button">もっと知る</a>
    </div>

</body>
</html>
